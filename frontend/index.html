                        <table>
                            <thead>
                                <tr>
                                    <th>Month</th>
                                    <th>Budget (Days)</th>
                                    <th>Actual (Days)</th>
                                    <th>Variance (Days)</th>
                                    <th>Variance (%)</th>
                                    <th>Cumulative Budget</th>
                                    <th>Cumulative Actual</th>
                                    <th>Cumulative Variance (Days)</th>
                                    <th>Cumulative Variance (%)</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${tableRows}
                                <tr class="grand-total-row">
                                    <td><strong>TOTAL</strong></td>
                                    <td><strong>${totalBudgetAll}</strong></td>
                                    <td><strong>${totalActualAll}</strong></td>
                                    <td class="${totalIsPositive ? 'variance-positive' : 'variance-negative'}">
                                        <strong>${totalIsPositive ? '+' : ''}${totalVariance}</strong>
                                    </td>
                                    <td class="${totalIsPositive ? 'variance-positive' : 'variance-negative'}">
                                        <strong>${totalIsPositive ? '+' : ''}${totalVariancePercent}%</strong>
                                    </td>

                                    <td><strong>${totalActualAll}</strong></td>
                                    <td class="${totalIsPositive ? 'variance-positive' : 'variance-negative'}">
                                        <strong>${totalIsPositive ? '+' : ''}${totalVariance}</strong>
                                    </td>
                                    <td class="${totalIsPositive ? 'variance-positive' : 'variance-negative'}">
                                        <strong>${totalIsPositive ? '+' : ''}${totalVariancePercent}%</strong>

                <div class="card">

            const COLORS = [

                '#8b5cf6', '#ec4899', '#14b8a6', '#f97316', '#06b6d4',
                '#84cc16', '#6b7280', '#e11d48', '#7c3aed', '#0891b2'
            ];
            
            // 1. Revenue by Vessel
            const vesselCtx = document.getElementById('vesselRevenueChart');
            if (vesselCtx) {
                const vesselRevenue = {};
                state.invoices.forEach(i => {
                    const vessel = i.vessel_name || 'Unknown';
                    vesselRevenue[vessel] = (vesselRevenue[vessel] || 0) + (i.total_amount || 0);
                });
                const sorted = Object.entries(vesselRevenue).sort((a, b) => b[1] - a[1]);
                const labels = sorted.map(s => s[0]);
                const data = sorted.map(s => s[1]);
                const total = data.reduce((a, b) => a + b, 0);
                
                chartInstances.vesselRevenue = new Chart(vesselCtx, {
                    type: 'doughnut',
                    data: {
                        labels: labels,
                        datasets: [{
                            data: data,
                            backgroundColor: labels.map((_, i) => COLORS[i % COLORS.length]),
                            borderWidth: 2,
                            borderColor: '#ffffff'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { 
                                position: 'right',
                                labels: { 
                                    font: { size: 10 },
                                    boxWidth: 12,
                                    padding: 8
                                }
                            },
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        const value = context.parsed;
                                        const percentage = total > 0 ? ((value / total) * 100).toFixed(1) : 0;
                                        return context.label + ': RM ' + value.toLocaleString() + ' (' + percentage + '%)';
                                    }
                                }
                            }
                        },
                        cutout: '55%'
                    }
                });
            }
            
            // 2. Revenue by Client
            const clientCtx = document.getElementById('clientRevenueChart');
            if (clientCtx) {
                const clientRevenue = {};
                state.invoices.forEach(i => {
                    const client = i.charterer || 'Unknown';
                    clientRevenue[client] = (clientRevenue[client] || 0) + (i.total_amount || 0);

                const sorted = Object.entries(clientRevenue).sort((a, b) => b[1] - a[1]);
                const labels = sorted.map(s => s[0]);
                const data = sorted.map(s => s[1]);
                const total = data.reduce((a, b) => a + b, 0);
                
                chartInstances.clientRevenue = new Chart(clientCtx, {
                    type: 'doughnut',
                    data: {
                        labels: labels,
                        datasets: [{
                            data: data,
                            backgroundColor: labels.map((_, i) => COLORS[(i + 3) % COLORS.length]),
                            borderWidth: 2,
                            borderColor: '#ffffff'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { 
                                position: 'right',
                                labels: { 
                                    font: { size: 10 },
                                    boxWidth: 12,
                                    padding: 8
                                }
                            },
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        const value = context.parsed;
                                        const percentage = total > 0 ? ((value / total) * 100).toFixed(1) : 0;
                                        return context.label + ': RM ' + value.toLocaleString() + ' (' + percentage + '%)';
                                    }
                                }
                            }
                        },
                        cutout: '55%'
                    }
                });
            }
            
            // 3. Monthly Revenue Trend
            const trendCtx = document.getElementById('revenueTrendChart');
            if (trendCtx) {
                const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
                const monthMap = {
                    'Jan': '01', 'Feb': '02', 'Mar': '03', 'Apr': '04', 'May': '05', 'Jun': '06',
                    'Jul': '07', 'Aug': '08', 'Sep': '09', 'Oct': '10', 'Nov': '11', 'Dec': '12'
                };
                const monthlyData = {};
                monthNames.forEach(m => monthlyData[m] = 0);
                state.invoices.forEach(i => {
                    if (i.month) {
                        const monthNum = i.month.split('-')[1];
                        const monthName = Object.keys(monthMap).find(key => monthMap[key] === monthNum);
                        if (monthName) {
                            monthlyData[monthName] += i.total_amount || 0;
                        }
                    }
                });
                const data = monthNames.map(m => monthlyData[m]);
                chartInstances.revenueTrend = new Chart(trendCtx, {
                    type: 'line',
                    data: {
                        labels: monthNames,
                        datasets: [{
                            label: 'Revenue (RM)',
                            data: data,
                            borderColor: '#6366f1',
                            backgroundColor: 'rgba(99, 102, 241, 0.1)',
                            fill: true,
                            tension: 0.3,
                            pointBackgroundColor: '#6366f1',
                            pointBorderColor: '#ffffff',
                            pointBorderWidth: 2,
                            pointRadius: 4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        return 'RM ' + context.parsed.y.toLocaleString();
                                    }
                                }
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: {
                                    callback: function(value) { return 'RM ' + value.toLocaleString(); }
                                }
                            }
                        }
                    }
                });
            }
            
            // 4. Budget vs Actual
            const budgetCtx = document.getElementById('budgetVsActualChart');
            if (budgetCtx) {
                const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
                const monthMap = {
                    'Jan': '01', 'Feb': '02', 'Mar': '03', 'Apr': '04', 'May': '05', 'Jun': '06',
                    'Jul': '07', 'Aug': '08', 'Sep': '09', 'Oct': '10', 'Nov': '11', 'Dec': '12'
                };
                const budgetData = {};
                const actualData = {};
                monthNames.forEach(m => {
                    budgetData[m] = state.annualBudget[m] || 0;
                    actualData[m] = 0;
                });
                state.invoices.forEach(i => {
                    if (i.month) {
                        const monthNum = i.month.split('-')[1];
                        const monthName = Object.keys(monthMap).find(key => monthMap[key] === monthNum);
                        if (monthName) {
                            actualData[monthName] += i.total_amount || 0;
                        }
                    }
                });
                chartInstances.budgetVsActual = new Chart(budgetCtx, {
                    type: 'bar',
                    data: {
                        labels: monthNames,
                        datasets: [
                            {
                                label: 'Budgeted',
                                data: monthNames.map(m => budgetData[m]),
                                backgroundColor: 'rgba(99, 102, 241, 0.6)',
                                borderColor: 'rgba(99, 102, 241, 1)',
                                borderWidth: 1
                            },
                            {
                                label: 'Actual',
                                data: monthNames.map(m => actualData[m]),
                                backgroundColor: 'rgba(34, 197, 94, 0.6)',
                                borderColor: 'rgba(34, 197, 94, 1)',
                                borderWidth: 1
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { position: 'top' }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: {
                                    callback: function(value) { return 'RM ' + value.toLocaleString(); }
                                }
                            }
                        }
                    }
                });
            }
            
            // 5. Contract Status
            const contractCtx = document.getElementById('contractStatusChart');
            if (contractCtx) {
                const active = state.contracts.filter(c => c.status === 'active' || !c.status).length;
                const completed = state.contracts.filter(c => c.status === 'completed').length;
                chartInstances.contractStatus = new Chart(contractCtx, {
                    type: 'doughnut',
                    data: {
                        labels: ['Active', 'Completed'],
                        datasets: [{
                            data: [active, completed],
                            backgroundColor: ['#22c55e', '#3b82f6'],
                            borderWidth: 2,
                            borderColor: '#ffffff'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { position: 'bottom' }
                        },
                        cutout: '55%'
                    }
                });
            }
            
            // 6. Tender Status
            const tenderCtx = document.getElementById('tenderStatusChart');
            if (tenderCtx) {
                const statusMap = {};
                state.tenders.forEach(t => {
                    const status = t.status || 'submitted';
                    statusMap[status] = (statusMap[status] || 0) + 1;
                });
                const statusColors = {
                    'submitted': '#f59e0b',
                    'under-review': '#3b82f6',
                    'awarded': '#22c55e',
                    'rejected': '#ef4444',
                    'aborted': '#94a3b8',
                    'unsuccessful': '#ef4444'
                };
                const labels = Object.keys(statusMap);
                const data = Object.values(statusMap);
                const colors = labels.map(l => statusColors[l] || '#94a3b8');
                const total = data.reduce((a, b) => a + b, 0);
                chartInstances.tenderStatus = new Chart(tenderCtx, {
                    type: 'doughnut',
                    data: {
                        labels: labels.map(l => l.replace('-', ' ').toUpperCase()),
                        datasets: [{
                            data: data,
                            backgroundColor: colors,
                            borderWidth: 2,
                            borderColor: '#ffffff'
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { position: 'bottom' },
                            tooltip: {
                                callbacks: {
                                    label: function(context) {
                                        const value = context.parsed;
                                        const percentage = total > 0 ? ((value / total) * 100).toFixed(1) : 0;
                                        return context.label + ': ' + value + ' (' + percentage + '%)';
                                    }
                                }
                            }
                        },
                        cutout: '55%'
                    }
                });
            }
            
            // 7. Vessel Utilization
            const utilCtx = document.getElementById('utilizationChart');
            if (utilCtx) {
                const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
                const monthMap = {
                    'Jan': '01', 'Feb': '02', 'Mar': '03', 'Apr': '04', 'May': '05', 'Jun': '06',
                    'Jul': '07', 'Aug': '08', 'Sep': '09', 'Oct': '10', 'Nov': '11', 'Dec': '12'
                };
                const utilData = {};
                monthNames.forEach(m => utilData[m] = 0);
                state.invoices.forEach(i => {
                    if (i.month && i.duration) {
                        const monthNum = i.month.split('-')[1];
                        const monthName = Object.keys(monthMap).find(key => monthMap[key] === monthNum);
                        if (monthName) {
                            utilData[monthName] += i.duration || 0;
                        }
                    }
                });
                const data = monthNames.map(m => utilData[m]);
                chartInstances.utilization = new Chart(utilCtx, {
                    type: 'bar',
                    data: {
                        labels: monthNames,
                        datasets: [{
                            label: 'Onhire Days',
                            data: data,
                            backgroundColor: 'rgba(34, 197, 94, 0.7)',
                            borderColor: 'rgba(34, 197, 94, 1)',
                            borderWidth: 1
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { display: false }
                        },
                        scales: {
                            y: {
                                beginAtZero: true
                            }
                        }
                    }
                });
            }
        }

        // ===== OTHER RENDER FUNCTIONS =====
        function renderClients() {
            let rows = state.clients.map(c => `
                <tr>
                    <td><strong>${c.name}</strong></td>
                    <td>${c.contact_person || '-'}</td>
                    <td>${c.email || '-'}</td>
                    <td>${c.phone || '-'}</td>
                    <td>
                        <div class="action-group">

                            <button class="btn btn-danger btn-sm" data-delete="clients" data-id="${c.id}">🗑️</button>
                        </div>
                    </td>
                </tr>
            `).join('');
            if (!state.clients.length) {
                rows = `<tr><td colspan="5" class="empty-state">
                    <div class="empty-icon">👥</div>
                    <div class="empty-title">No clients yet</div>
                    <div class="empty-sub">Click "Add Client" to get started</div>

                <div class="page-header">

                    <button class="btn btn-primary" id="addClientBtn">➕ Add Client</button>
                </div>
                <div class="card">
                    <div class="card-header"><h3>All Clients (${state.clients.length})</h3></div>
                    <div class="table-container">
                        <table>
                            <thead><tr><th>Name</th><th>Contact Person</th><th>Email</th><th>Phone</th><th>Actions</th></tr></thead>
                            <tbody>${rows}</tbody>

            `;
        }

        function renderVessels() {
            let rows = state.vessels.map(v => `
                <tr>
                    <td><strong>${v.name}</strong></td>
                    <td>${v.imo || '-'}</td>
                    <td>${v.type || '-'}</td>
                    <td>${v.flag || '-'}</td>
                    <td>${v.year || '-'}</td>
                    <td>${v.speed || '-'}</td>
                    <td>${v.total_seat || '-'}</td>
                    <td>
                        <div class="action-group">
                            ${v.spec_file ? `<a href="${API_URL}/uploads/${v.spec_file}" target="_blank" class="btn btn-success btn-xs">📄 Spec</a>` : `<span class="doc-badge missing">No Spec</span>`}
                            ${v.ga_file ? `<a href="${API_URL}/uploads/${v.ga_file}" target="_blank" class="btn btn-success btn-xs">📐 GA</a>` : `<span class="doc-badge missing">No GA</span>`}
                            ${state.user?.role === 'admin' ? `
                                <div class="file-input-wrapper">
                                    <button class="btn btn-info btn-xs">📤 Upload Spec</button>
                                    <input type="file" accept=".pdf,.doc,.docx" data-upload="spec" data-vessel-id="${v.id}" />
                                </div>
                                <div class="file-input-wrapper">
                                    <button class="btn btn-info btn-xs">📤 Upload GA</button>
                                    <input type="file" accept=".pdf,.doc,.docx" data-upload="ga" data-vessel-id="${v.id}" />
                                </div>
                            ` : ''}
                        </div>
                    </td>
                    <td>
                        <div class="action-group">
                            <button class="btn btn-warning btn-sm" data-edit="vessels" data-id="${v.id}">✏️ Edit</button>
                            <button class="btn btn-danger btn-sm" data-delete="vessels" data-id="${v.id}">🗑️</button>
                        </div>
                    </td>
                </tr>
            `).join('');
            if (!state.vessels.length) {
                rows = `<tr><td colspan="9" class="empty-state">
                    <div class="empty-icon">🚢</div>
                    <div class="empty-title">No vessels yet</div>
                    <div class="empty-sub">Click "Add Vessel" to get started</div>
                </td></tr>`;
            }
            return `
                <div class="page-header">
                    <div><h1>🚢 Vessels</h1><div class="subtitle">Manage your fleet</div></div>
                    <button class="btn btn-primary" id="addVesselBtn">➕ Add Vessel</button>
                </div>
                <div class="card">
                    <div class="card-header">
                        <h3>Fleet Directory (${state.vessels.length})</h3>
                        ${state.user?.role === 'admin' ? '<span style="font-size:12px;color:#64748b;">🔑 Admin: Upload documents</span>' : ''}
                    </div>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr><th>Vessel Name</th><th>IMO No.</th><th>Type</th><th>Flag</th><th>Year</th><th>Speed</th><th>Seats</th><th>Documents</th><th>Actions</th></tr>
                            </thead>
                            <tbody>${rows}</tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        function renderContracts() {
            const activeContracts = state.contracts.filter(c => c.status === 'active' || !c.status);
            const completedContracts = state.contracts.filter(c => c.status === 'completed');
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            activeContracts.forEach(c => {
                if (c.completion_date) {
                    const completionDate = new Date(c.completion_date);
                    completionDate.setHours(0, 0, 0, 0);
                    if (completionDate < today) {
                        putData('contracts', c.id, { ...c, status: 'completed' }).then(() => {
                            loadAllData();
                        });
                    }
                }
            });

            function calculateBalance(c) {
                if (c.status === 'completed' || !c.completion_date) return 0;
                const completionDate = new Date(c.completion_date);
                completionDate.setHours(0, 0, 0, 0);
                if (completionDate <= today) return 0;
                const remainingDays = Math.ceil((completionDate - today) / (1000 * 60 * 60 * 24));
                const dcr = parseFloat(c.dcr) || 0;
                const mobDemob = parseFloat(c.mob_demob) || 0;
                return (dcr * remainingDays) + mobDemob;
            }

            let activeRows = activeContracts.map(c => {
                const balanceValue = calculateBalance(c);
                return `
                <tr>
                    <td><strong>${c.title || '-'}</strong></td>
                    <td>${c.client_name || '-'}</td>
                    <td>${c.vessel_name || '-'}</td>
                    <td>RM ${c.dcr ? Number(c.dcr).toLocaleString() : '-'}</td>
                    <td>${c.commencement_date || '-'}</td>
                    <td>${c.completion_date || '-'}</td>
                    <td>RM ${c.contract_value ? Number(c.contract_value).toLocaleString() : '-'}</td>
                    <td>RM ${balanceValue > 0 ? Number(balanceValue).toLocaleString() : '-'}</td>
                    <td><span class="status-badge active">Active</span></td>
                    <td>
                        <div class="action-group">
                            <button class="btn btn-warning btn-sm" data-edit="contracts" data-id="${c.id}">✏️ Edit</button>
                            <button class="btn btn-danger btn-sm" data-delete="contracts" data-id="${c.id}">🗑️</button>
                        </div>
                    </td>
                </tr>
            `}).join('');

            let completedRows = completedContracts.map(c => `
                <tr>
                    <td><strong>${c.title || '-'}</strong></td>
                    <td>${c.client_name || '-'}</td>
                    <td>${c.vessel_name || '-'}</td>
                    <td>RM ${c.dcr ? Number(c.dcr).toLocaleString() : '-'}</td>
                    <td>${c.commencement_date || '-'}</td>
                    <td>${c.completion_date || '-'}</td>
                    <td>RM ${c.contract_value ? Number(c.contract_value).toLocaleString() : '-'}</td>
                    <td>Completed</td>
                    <td><span class="status-badge completed">Completed</span></td>
                    <td>
                        <div class="action-group">
                            <button class="btn btn-warning btn-sm" data-edit="contracts" data-id="${c.id}">✏️ Edit</button>
                            <button class="btn btn-danger btn-sm" data-delete="contracts" data-id="${c.id}">🗑️</button>
                        </div>
                    </td>
                </tr>
            `).join('');

            if (!state.contracts.length) {
                activeRows = `<tr><td colspan="10" class="empty-state">
                    <div class="empty-icon">📄</div>
                    <div class="empty-title">No contracts yet</div>
                    <div class="empty-sub">Click "Add Contract" to get started</div>
                </td></tr>`;
                completedRows = '';
            }

            return `
                <div class="page-header">
                    <div><h1>📄 Contracts</h1><div class="subtitle">Manage active and completed contracts</div></div>
                    <button class="btn btn-primary" id="addContractBtn">➕ Add Contract</button>
                </div>
                
                <div class="card">
                    <div class="card-header">
                        <h3>🟢 Active Contracts</h3>
                        <span class="count-badge">${activeContracts.length}</span>
                    </div>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Title</th>
                                    <th>Client</th>
                                    <th>Vessel</th>
                                    <th>DCR</th>
                                    <th>Start Date</th>
                                    <th>End Date</th>
                                    <th>Total Value</th>
                                    <th>Balance Value</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>${activeRows}</tbody>
                        </table>
                    </div>
                </div>
                
                ${completedContracts.length > 0 ? `
                <div class="section-divider">Completed Contracts</div>
                <div class="card">
                    <div class="card-header">
                        <h3>🔵 Completed Contracts</h3>
                        <span class="count-badge">${completedContracts.length}</span>
                    </div>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Title</th>
                                    <th>Client</th>
                                    <th>Vessel</th>
                                    <th>DCR</th>
                                    <th>Start Date</th>
                                    <th>End Date</th>
                                    <th>Total Value</th>
                                    <th>Balance</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>${completedRows}</tbody>
                        </table>
                    </div>
                </div>
                ` : ''}
            `;
        }

        // ===== START APP =====
        window.updateContractCalc = updateContractCalc;
        window.updateTenderCalc = updateTenderCalc;
        window.updateInvoiceCalc = updateInvoiceCalc;
        window.updateUtilizationCalc = updateUtilizationCalc;
        window.updateExpectedPayment = updateExpectedPayment;
        window.updateBudget = updateBudget;
        window.updateUtilizationBudget = updateUtilizationBudget;
        window.renderCharts = renderCharts;
        window.switchTab = switchTab;

        if (checkSession()) {
            loadAllData();
        } else {
            render();
        }
        console.log('🚀 DJ Group Chartering Database loaded!');
    </script>
